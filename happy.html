<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;400;500;600&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          #ffd1dc 0%,
          #e6e6fa 25%,
          #ffefd5 50%,
          #e6e6fa 75%,
          #ffd1dc 100%
        );
        background-size: 400% 400%;
        animation: gradientFlow 15s ease infinite;
        font-family: "Quicksand", sans-serif;
        overflow-x: hidden;
        color: #4a4a4a;
      }
      img {
        display: block;
        margin: 0 auto;
        width: 200px;
        height: auto;
        animation: float 3s ease-in-out infinite;
      }
      h1 {
        font-family: "Dancing Script", cursive;
        font-size: 3.5rem;
        text-align: center;
        margin-top: 20vh;
        color: #ff69b4;
        text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.5);
      }
      h2 {
        font-size: 2rem;
        text-align: center;
        margin-top: 20px;
        color: #ff69b4;
        text-shadow: 1px 1px 3px rgba(255, 105, 180, 0.5);
      }

      #box-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      img {
        width: 300px;
        height: 400px;
        margin: 50px;
        /* border: 1px solid rgb(252, 157, 220);*/
        /*border-radius: 150px;*/
        box-shadow: 20px 20px 50px 30px rgb(235, 145, 190);
      }

      img:hover {
        -webkit-transform: rotateY(180deg);
        -webkit-transition: all 1.5s ease;
      }
    </style>
  </head>

  <body>
    <div>
      <div id="box-container">
        <div id="box-1">
          <img src="./image copy 2.png" />
        </div>
        <div id="box-2">
          <img src="./image copy 5.png" />
        </div>
        <div id="box-3">
          <img src="./image copy 4.png" />
        </div>
      </div>
    </div>
    <h1>ONCE AGAIN HAPPY BIRTHDAY MY LOVE💗</h1>
    <h2>LOVE YOUUUUUUUUU....!</h2>
  </body>
</html>
